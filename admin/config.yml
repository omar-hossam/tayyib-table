local_backend: true

backend:
  name: git-gateway
  branch: main # or master
  # For local development, git-gateway will work with netlify-identity-widget

media_folder: "src/images/gallery"
public_folder: "/images/gallery"

# Local development settings
site_url: http://localhost:8080
display_url: http://localhost:8080

collections:
  - name: "info"
    label: "Restaurant Info"
    label_singular: "Info"
    folder: "content/info"
    create: false
    format: "json"
    slug: "info"
    fields:
      - { label: "Logo", name: "logo", widget: "image", required: true }
      - { label: "About us", name: "about", hint: "3 or 4 short sentences about the restaurant", widget: "text", required: true }
      - { label: "Phone", name: "phone", widget: "string", required: true }
      - { label: "WhatsApp Phone", name: "whatsapp", widget: "string", required: true }
      - { 
        label: "Opening Hours", 
        name: "hours", 
        widget: "string", 
        default: "Everyday: 9 AM – 11 PM",
        hint: "Examples: 'Everyday: 9 AM – 11 PM' or 'Mon–Thu: 9am–10pm, Fri–Sat: 9am–12am'" 
      }
      - { label: "Address (Google maps link)", name: "maps_link", widget: "string", default: "https://maps.app.goo.gl/...", required: true }

  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    identifier_field: "title"
    summary: "{{title}} - ${{price}}"
    preview_path: "products/{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Price", name: "price", widget: "number", value_type: "float", step: 0.01, required: true }
      - { label: "Price After Discount", name: "price_discount", widget: "number", value_type: "float", step: 0.01, required: false }
      - { label: "Category", name: "category", widget: "select", options: 
          [
            "Burgers & Sandwiches", 
            "Grilled Chicken", 
            "Meat & Beef", 
            "Sides", 
            "Drinks", 
            "Desserts", 
            "Wraps & Shawarma", 
            "Specials / Offers"
          ], required: true
      }
      - { label: "Description", name: "body", widget: "markdown", required: true }
      - { label: "Product Image", name: "image", widget: "image", required: true }

  - name: "offers"
    label: "Offers"
    label_singular: "Offer"
    folder: "src/content/offers"
    create: true
    identifier_field: "alt_text"
    fields: 
      - { label: "Offer Image", name: "image", widget: "image", required: true }
      - { label: "Alternative Text", name: "alt_text", widget: "string", required: true }

  - name: "reviews"
    label: "Customer Reviews"
    label_singular: "Review"
    folder: "src/content/reviews"
    create: true
    identifier_field: "name"
    fields: 
      - { label: "Customer Name", name: "name", widget: "string", required: true }
      - { label: "Stars", name: "stars", widget: "number", min: 1, max: 5, step: 1, hint: "Rating from 1-5 stars", required: true }
      - { label: "Review Content", name: "content", widget: "markdown", required: true }
      - { label: "Date", name: "date", widget: "datetime", default: "", required: false }
